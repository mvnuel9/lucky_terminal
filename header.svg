<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" role="img" aria-labelledby="title desc">
  <title id="title">Lucky Terminal</title>
  <desc id="desc">Bannière du projet Lucky Terminal — thème terminal multi-plateforme</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1210"/>
      <stop offset="45%" stop-color="#2a1814"/>
      <stop offset="100%" stop-color="#1e1512"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4783a"/>
      <stop offset="50%" stop-color="#e0a040"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" rx="12" ry="12"/>
  <rect x="2" y="2" width="916" height="196" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.35" rx="10" ry="10"/>
  <!-- Motif terminal minimal -->
  <g transform="translate(48 56)" opacity="0.9">
    <rect width="52" height="40" rx="6" fill="#0d0908" stroke="#e0a040" stroke-opacity="0.5" stroke-width="1"/>
    <circle cx="14" cy="14" r="3.5" fill="#c4783a"/>
    <circle cx="26" cy="14" r="3.5" fill="#d4a574"/>
    <rect x="10" y="22" width="32" height="3" rx="1" fill="#f0dfc0" opacity="0.35"/>
    <rect x="10" y="28" width="22" height="3" rx="1" fill="#e0a040" opacity="0.45"/>
  </g>
  <text x="120" y="108" fill="#f0dfc0" font-family="ui-sans-serif, system-ui, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="-0.02em">Lucky Terminal</text>
  <text x="120" y="148" fill="#d4a574" font-family="ui-sans-serif, system-ui, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="500" opacity="0.92">Thème Automnale · Linux · macOS · Windows</text>
  <line x1="120" y1="128" x2="320" y2="128" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
</svg>
